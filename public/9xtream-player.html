<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>9XTREAM - Premium Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://vjs.zencdn.net">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a25;
  --bg-hover: #252535;
  --bg-glass: rgba(26, 26, 37, 0.85);
  --accent: #00d4ff;
  --accent-secondary: #7c3aed;
  --accent-glow: rgba(0, 212, 255, 0.25);
  --accent-glow-strong: rgba(0, 212, 255, 0.5);
  --text-primary: #ffffff;
  --text-secondary: #a0a0b0;
  --text-muted: #606070;
  --danger: #ff4757;
  --success: #10b981;
  --warning: #f59e0b;
  --gradient-accent: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
  --gradient-accent-hover: linear-gradient(135deg, #00b8e6 0%, #6d28d9 100%);
  --gradient-bg: linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
  --gradient-card: linear-gradient(145deg, rgba(26, 26, 37, 0.9) 0%, rgba(18, 18, 26, 0.95) 100%);
  --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
  --shadow-glow: 0 0 30px var(--accent-glow);
  --shadow-glow-strong: 0 0 50px var(--accent-glow-strong);
  --shadow-elevated: 0 20px 60px rgba(0, 0, 0, 0.5);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-lg: 24px;
  --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--gradient-bg);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Premium Scrollbar */
::-webkit-scrollbar { 
  width: 8px; 
  height: 8px; 
}
::-webkit-scrollbar-track { 
  background: var(--bg-secondary);
  border-radius: 4px;
}
::-webkit-scrollbar-thumb { 
  background: linear-gradient(180deg, var(--accent) 0%, var(--accent-secondary) 100%);
  border-radius: 4px;
  transition: var(--transition-smooth);
}
::-webkit-scrollbar-thumb:hover { 
  background: var(--accent);
  box-shadow: var(--shadow-glow);
}

/* Selection */
::selection {
  background: var(--accent);
  color: var(--bg-primary);
}

/* ============================================
   LOGIN SCREEN - ULTRA PREMIUM
   ============================================ */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at top, #1a1a2e 0%, #0a0a0f 50%, #050508 100%);
  position: relative;
  overflow: hidden;
}

#loginScreen::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 30% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 40%);
  animation: floatBg 20s ease-in-out infinite;
}

@keyframes floatBg {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(2%, 2%) rotate(2deg); }
  66% { transform: translate(-1%, 1%) rotate(-1deg); }
}

.login-container {
  background: var(--gradient-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: 3rem;
  width: 100%;
  max-width: 440px;
  box-shadow: var(--shadow-elevated), 0 0 80px rgba(0, 212, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.08);
  position: relative;
  z-index: 1;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.login-header .logo {
  font-size: 4rem;
  margin-bottom: 1rem;
  display: block;
  filter: drop-shadow(0 0 20px var(--accent-glow));
  animation: pulse-glow 3s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 20px var(--accent-glow)); }
  50% { filter: drop-shadow(0 0 35px var(--accent-glow-strong)); }
}

.login-header h1 {
  font-size: 2rem;
  font-weight: 800;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.login-header p {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-top: 0.5rem;
}

.form-floating {
  margin-bottom: 1.25rem;
}

.form-floating .form-control {
  background: rgba(18, 18, 26, 0.8);
  border: 2px solid rgba(255, 255, 255, 0.08);
  color: var(--text-primary);
  border-radius: var(--radius);
  height: 60px;
  padding: 1rem 1rem;
  font-size: 1rem;
  transition: var(--transition-smooth);
}

.form-floating .form-control:focus {
  background: rgba(18, 18, 26, 0.95);
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow), var(--shadow-glow);
  color: var(--text-primary);
}

.form-floating .form-control::placeholder {
  color: transparent;
}

.form-floating label {
  color: var(--text-muted);
  padding: 1rem;
  transition: var(--transition-smooth);
}

.btn-login {
  width: 100%;
  padding: 1rem;
  font-size: 1.1rem;
  font-weight: 700;
  background: var(--gradient-accent);
  border: none;
  border-radius: var(--radius);
  color: white;
  cursor: pointer;
  transition: var(--transition-bounce);
  margin-top: 0.75rem;
  position: relative;
  overflow: hidden;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-login::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: 0.5s;
}

.btn-login:hover::before {
  left: 100%;
}

.btn-login:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: var(--shadow-glow-strong);
}

.btn-login:active {
  transform: translateY(-1px) scale(1);
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* ============================================
   MAIN APP LAYOUT
   ============================================ */
#app {
  display: none;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* Header - Glass Effect */
.app-header {
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: var(--transition-smooth);
}

.app-header.scrolled {
  background: rgba(10, 10, 15, 0.98);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}

.app-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-weight: 800;
  font-size: 1.5rem;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
}

.app-logo .logo-icon {
  font-size: 1.75rem;
  filter: drop-shadow(0 0 10px var(--accent-glow));
}

.search-box {
  flex: 1;
  max-width: 500px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 0.875rem 1.25rem 0.875rem 3rem;
  background: rgba(26, 26, 37, 0.8);
  border: 2px solid rgba(255, 255, 255, 0.08);
  border-radius: 50px;
  color: var(--text-primary);
  font-size: 0.95rem;
  transition: var(--transition-smooth);
}

.search-box input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
  background: rgba(26, 26, 37, 0.95);
}

.search-box input::placeholder {
  color: var(--text-muted);
}

.search-box i {
  position: absolute;
  left: 1.25rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 1rem;
  transition: var(--transition-smooth);
}

.search-box:focus-within i {
  color: var(--accent);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(26, 26, 37, 0.8);
  border: 2px solid rgba(255, 255, 255, 0.08);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: var(--transition-bounce);
  font-size: 1.1rem;
}

.btn-icon:hover {
  background: var(--gradient-accent);
  color: white;
  border-color: transparent;
  transform: scale(1.1);
  box-shadow: var(--shadow-glow);
}

.btn-icon.danger:hover {
  background: var(--danger);
}

/* Cache Indicator */
.cache-indicator {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.375rem 1rem;
  background: rgba(26, 26, 37, 0.8);
  border-radius: 50px;
  font-size: 0.75rem;
  color: var(--text-muted);
  border: 1px solid rgba(255, 255, 255, 0.06);
}

.cache-indicator.active {
  color: var(--success);
  border-color: rgba(16, 185, 129, 0.3);
}

.cache-indicator .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: var(--transition-smooth);
}

.cache-indicator.active .dot {
  background: var(--success);
  box-shadow: 0 0 10px var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

/* ============================================
   BOTTOM NAVIGATION - PREMIUM
   ============================================ */
.nav-tabs-bottom {
  background: var(--bg-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 0.75rem 1rem;
  display: flex;
  justify-content: space-around;
  gap: 0.5rem;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
}

.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.375rem;
  padding: 0.625rem 1.25rem;
  background: transparent;
  border: none;
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 0.7rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-bounce);
  white-space: nowrap;
  position: relative;
}

.nav-tab::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 3px;
  background: var(--gradient-accent);
  border-radius: 0 0 3px 3px;
  transition: var(--transition-smooth);
}

.nav-tab:hover {
  color: var(--text-primary);
  background: rgba(255, 255, 255, 0.05);
}

.nav-tab.active {
  color: var(--accent);
}

.nav-tab.active::before {
  width: 60%;
}

.nav-tab.active i {
  filter: drop-shadow(0 0 8px var(--accent-glow));
}

.nav-tab i {
  font-size: 1.5rem;
  transition: var(--transition-smooth);
}

/* ============================================
   MAIN CONTENT LAYOUT
   ============================================ */
.main-content {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 150px);
}

/* Sidebar */
.sidebar-categories {
  background: var(--bg-secondary);
  border-right: 1px solid rgba(255, 255, 255, 0.05);
  overflow-y: auto;
  max-height: calc(100vh - 150px);
  position: sticky;
  top: 76px;
}

.sidebar-header {
  padding: 1.25rem 1rem;
  font-weight: 700;
  color: var(--text-muted);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0, 0, 0, 0.2);
}

.cache-badge {
  font-size: 0.6rem;
  padding: 0.2rem 0.6rem;
  background: var(--gradient-accent);
  color: white;
  border-radius: 50px;
  font-weight: 700;
  box-shadow: var(--shadow-glow);
}

.category-list {
  padding: 0.5rem;
}

.category-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.875rem 1rem;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition-smooth);
  font-size: 0.9rem;
  font-weight: 500;
  margin-bottom: 0.25rem;
}

.category-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
  transform: translateX(4px);
}

.category-item.active {
  background: var(--gradient-accent);
  color: white;
  box-shadow: var(--shadow-glow);
}

.category-item .count {
  font-size: 0.7rem;
  background: rgba(255, 255, 255, 0.1);
  padding: 0.2rem 0.6rem;
  border-radius: 50px;
  font-weight: 600;
}

.category-item.active .count {
  background: rgba(255, 255, 255, 0.25);
}

/* Content Area */
.content-area {
  padding: 1.5rem;
  overflow-y: auto;
}

.content-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
}

.content-title {
  font-size: 1.5rem;
  font-weight: 700;
  background: var(--gradient-accent);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.content-count {
  color: var(--text-muted);
  font-size: 0.9rem;
  font-weight: 500;
}

/* ============================================
   PLAYER SECTION - ENHANCED (ALWAYS VISIBLE)
   ============================================ */
.player-section {
  background: linear-gradient(145deg, rgba(18, 18, 26, 0.95) 0%, rgba(10, 10, 15, 0.98) 100%);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-elevated);
  border: 1px solid rgba(255, 255, 255, 0.05);
  display: none;
}

.player-section.show {
  display: block;
}

.video-js {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.player-info {
  padding: 1rem 1.5rem;
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}

.now-playing {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.now-playing-dot {
  width: 10px;
  height: 10px;
  background: var(--danger);
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 10px var(--danger);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

.now-playing-text {
  font-weight: 600;
  font-size: 1rem;
}

.stream-info {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* ============================================
   EPG SECTION - BELOW PLAYER
   ============================================ */
.epg-section {
  background: linear-gradient(135deg, rgba(124, 58, 237, 0.15) 0%, rgba(0, 212, 255, 0.1) 100%);
  border-left: 4px solid var(--accent);
  padding: 1rem 1.5rem;
  display: none;
}

.epg-section.show {
  display: block;
  animation: slideDown 0.3s ease-out;
}

@keyframes slideDown {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.epg-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.epg-header i {
  color: var(--accent);
}

.epg-current {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.epg-program {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.epg-time {
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  min-width: 90px;
}

.epg-title {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.epg-title.marquee {
  animation: marquee 10s linear infinite;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-100%); }
}

.epg-next {
  margin-top: 0.5rem;
  padding-top: 0.5rem;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.epg-next .epg-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-bottom: 0.25rem;
}

/* ============================================
   EPISODES SECTION - BELOW PLAYER (NEW!)
   ============================================ */
.player-episodes-section {
  background: var(--bg-card);
  border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  padding: 1.25rem 1.5rem;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  display: none;
}

.player-episodes-section.show {
  display: block;
  animation: slideDown 0.3s ease-out;
}

.episodes-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 1rem;
}

.episodes-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.episodes-title i {
  color: var(--accent);
}

.seasons-tabs {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.season-tab {
  padding: 0.5rem 1rem;
  background: var(--bg-secondary);
  border: 2px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition-smooth);
}

.season-tab:hover {
  border-color: var(--accent);
  color: var(--text-primary);
}

.season-tab.active {
  background: var(--gradient-accent);
  border-color: transparent;
  color: white;
  box-shadow: var(--shadow-glow);
}

.episodes-scroll {
  display: flex;
  gap: 0.75rem;
  overflow-x: auto;
  padding: 0.5rem 0;
  scroll-snap-type: x mandatory;
}

.episode-card-horizontal {
  flex-shrink: 0;
  width: 200px;
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  padding: 1rem;
  cursor: pointer;
  transition: var(--transition-smooth);
  border: 2px solid transparent;
  scroll-snap-align: start;
}

.episode-card-horizontal:hover {
  background: var(--bg-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
}

.episode-card-horizontal.playing {
  border-color: var(--accent);
  background: rgba(0, 212, 255, 0.1);
}

.episode-number-badge {
  width: 36px;
  height: 36px;
  background: var(--gradient-accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: white;
  font-size: 0.9rem;
  margin-bottom: 0.75rem;
}

.episode-card-horizontal .ep-title {
  font-size: 0.9rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;

<script>
// ============================================================================
// CONFIGURATION
// ============================================================================
const CACHE_CONFIG = {
  CATEGORIES_TTL: 24 * 60 * 60 * 1000,
  ITEMS_TTL: 6 * 60 * 60 * 1000,
  DETAILS_TTL: 24 * 60 * 60 * 1000,
  EPG_TTL: 4 * 60 * 60 * 1000,
  SESSION_TTL: 7 * 24 * 60 * 60 * 1000,
  PREFIX: 'unitv_cache_',
  VERSION: 'v6'
};

// Stream Types
const STREAM_TYPES = {
  HLS: ['m3u8', 'hls'],
  TS: ['ts'],
  MP4: ['mp4', 'mkv', 'avi'],
  M3U: ['m3u'],
  QUALITY: { SD: 'SD', HD: 'HD', FHD: 'FHD', UHD: '4K', '4K': '4K' },
  CODEC: { H264: 'H.264', H265: 'H.265', HEVC: 'HEVC' }
};

// ============================================================================
// GLOBAL VARIABLES
// ============================================================================
let API = { base: "", user: "", pass: "" };
let userInfo = {};
let categories = [];
let items = [];
let allItems = []; // Store ALL items for global search
let filteredItems = [];
let favorites = JSON.parse(localStorage.getItem("unitvFav") || "[]");
let player = null;
let hlsInstance = null;
let currentTab = "live";
let currentCategory = null;
let currentSeriesInfo = null;
let currentPlayingSeriesId = null;
let currentPlayingSeason = null;
let currentPlayingEpisodeId = null;
let currentPlayingChannel = null;
let isLoading = false;
let isGlobalSearch = false;

// Infinite Scroll Config
const INFINITE_SCROLL = {
  itemsPerPage: 60,
  currentPage: 0,
  hasMore: true,
  loading: false,
  observer: null
};

// Debounce
let searchDebounceTimer = null;
const SEARCH_DEBOUNCE_MS = 300;

// Memory Cache
const memoryCache = {
  categories: { live: null, movies: null, series: null },
  items: { live: {}, movies: {}, series: {} },
  allItems: { live: null, movies: null, series: null },
  details: {},
  epg: {},
  lastLoadedCategory: { live: null, movies: null, series: null }
};

// ============================================================================
// CACHE FUNCTIONS
// ============================================================================
function getCacheKey(type, id = '') {
  return `${CACHE_CONFIG.PREFIX}${CACHE_CONFIG.VERSION}_${type}_${id}`;
}

function setCache(key, data, ttl = CACHE_CONFIG.ITEMS_TTL) {
  try {
    const cacheData = { data, timestamp: Date.now(), expires: Date.now() + ttl };
    localStorage.setItem(key, JSON.stringify(cacheData));
    updateCacheIndicator(true);
  } catch (e) {
    if (e.name === 'QuotaExceededError') {
      cleanOldCache();
      try {
        localStorage.setItem(key, JSON.stringify({ data, timestamp: Date.now(), expires: Date.now() + ttl }));
      } catch (e2) {
        console.error('[CACHE] Error:', e2);
      }
    }
  }
}

function getCache(key) {
  try {
    const cached = localStorage.getItem(key);
    if (!cached) return null;
    const cacheData = JSON.parse(cached);
    if (Date.now() > cacheData.expires) {
      localStorage.removeItem(key);
      return null;
    }
    updateCacheIndicator(true);
    return cacheData.data;
  } catch (e) {
    return null;
  }
}

function getCachedData(type, tab, categoryId = 'all') {
  const key = categoryId === 'all' ? 'all' : categoryId;
  
  if (type === 'categories' && memoryCache.categories[tab]) {
    return memoryCache.categories[tab];
  }
  
  if (type === 'items' && memoryCache.items[tab] && memoryCache.items[tab][key]) {
    return memoryCache.items[tab][key];
  }
  
  if (type === 'allItems' && memoryCache.allItems[tab]) {
    return memoryCache.allItems[tab];
  }
  
  const cacheKey = getCacheKey(type, `${tab}_${key}`);
  const localData = getCache(cacheKey);
  
  if (localData) {
    if (type === 'categories') {
      memoryCache.categories[tab] = localData;
    } else if (type === 'items') {
      if (!memoryCache.items[tab]) memoryCache.items[tab] = {};
      memoryCache.items[tab][key] = localData;
    } else if (type === 'allItems') {
      memoryCache.allItems[tab] = localData;
    }
    return localData;
  }
  
  return null;
}

function setCachedData(type, tab, data, categoryId = 'all', ttl = null) {
  const key = categoryId === 'all' ? 'all' : categoryId;
  
  if (type === 'categories') {
    memoryCache.categories[tab] = data;
  } else if (type === 'items') {
    if (!memoryCache.items[tab]) memoryCache.items[tab] = {};
    memoryCache.items[tab][key] = data;
  } else if (type === 'allItems') {
    memoryCache.allItems[tab] = data;
  }
  
  const cacheKey = getCacheKey(type, `${tab}_${key}`);
  const cacheTTL = ttl || (type === 'categories' ? CACHE_CONFIG.CATEGORIES_TTL : CACHE_CONFIG.ITEMS_TTL);
  setCache(cacheKey, data, cacheTTL);
}

function updateCacheIndicator(active) {
  const indicator = document.getElementById('cacheIndicator');
  const status = document.getElementById('cacheStatus');
  const badge = document.getElementById('cacheBadge');
  
  if (active) {
    indicator.classList.add('active');
    status.textContent = 'Cache: Ativo';
    if (badge) badge.style.display = 'inline';
  } else {
    indicator.classList.remove('active');
    status.textContent = 'Cache: Inativo';
    if (badge) badge.style.display = 'none';
  }
}

function cleanOldCache() {
  const keys = Object.keys(localStorage);
  keys.forEach(key => {
    if (key.startsWith(CACHE_CONFIG.PREFIX)) {
      try {
        const cached = JSON.parse(localStorage.getItem(key));
        if (cached && cached.expires && Date.now() > cached.expires) {
          localStorage.removeItem(key);
        }
      } catch (e) {
        localStorage.removeItem(key);
      }
    }
  });
}

function clearAllCache() {
  const keys = Object.keys(localStorage);
  keys.forEach(key => {
    if (key.startsWith(CACHE_CONFIG.PREFIX) || key.startsWith('unitv')) {
      localStorage.removeItem(key);
    }
  });
  
  memoryCache.categories = { live: null, movies: null, series: null };
  memoryCache.items = { live: {}, movies: {}, series: {} };
  memoryCache.allItems = { live: null, movies: null, series: null };
  memoryCache.details = {};
  memoryCache.epg = {};
  memoryCache.lastLoadedCategory = { live: null, movies: null, series: null };
  
  updateCacheIndicator(false);
  showToast('Cache limpo com sucesso!', 'success');
}

// ============================================================================
// SESSION MANAGEMENT
// ============================================================================
function saveSession(api, user) {
  const session = { api, user, timestamp: Date.now() };
  localStorage.setItem('unitv_session', JSON.stringify(session));
}

function restoreSession() {
  try {
    const session = JSON.parse(localStorage.getItem('unitv_session'));
    if (!session) return false;
    if (Date.now() - session.timestamp > CACHE_CONFIG.SESSION_TTL) {
      localStorage.removeItem('unitv_session');
      return false;
    }
    API = session.api;
    userInfo = session.user;
    return true;
  } catch (e) {
    return false;
  }
}

// ============================================================================
// UTILITY FUNCTIONS
// ============================================================================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
  toast.innerHTML = `<i class="bi bi-${icons[type] || 'info-circle'}"></i><span>${message}</span>`;
  
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('show');
}

function unixToDate(timestamp) {
  if (!timestamp) return 'N/A';
  return new Date(timestamp * 1000).toLocaleDateString('pt-BR');
}

async function fetchWithTimeout(url, options = {}, timeout = 15000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const response = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(id);
    return response;
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function fetchWithRetry(url, options = {}, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      return await fetchWithTimeout(url, options);
    } catch (e) {
      if (i === retries - 1) throw e;
      await new Promise(r => setTimeout(r, 1000 * (i + 1)));
    }
  }
}

function generateStreamBadges(item, ext) {
  let badges = [];
  const name = (item.name || '').toLowerCase();
  
  if (ext) {
    if (STREAM_TYPES.HLS.includes(ext)) badges.push('<span class="stream-badge hls">HLS</span>');
    else if (STREAM_TYPES.TS.includes(ext)) badges.push('<span class="stream-badge ts">TS</span>');
    else if (STREAM_TYPES.MP4.includes(ext)) badges.push('<span class="stream-badge mp4">MP4</span>');
  }
  
  if (name.includes('4k') || name.includes('uhd')) badges.push('<span class="stream-badge uhd">4K</span>');
  else if (name.includes('fhd') || name.includes('1080')) badges.push('<span class="stream-badge fhd">FHD</span>');
  else if (name.includes(' hd') || name.includes('[hd]') || name.includes('720')) badges.push('<span class="stream-badge hd">HD</span>');
  
  if (name.includes('h265') || name.includes('hevc')) badges.push('<span class="stream-badge h265">H.265</span>');
  else if (name.includes('h264')) badges.push('<span class="stream-badge h264">H.264</span>');
  
  return badges.length > 0 ? `<div class="stream-type-badge">${badges.join('')}</div>` : '';
}

// ============================================================================
// INFINITE SCROLL
// ============================================================================
function setupInfiniteScroll() {
  if (INFINITE_SCROLL.observer) {
    INFINITE_SCROLL.observer.disconnect();
  }
  
  INFINITE_SCROLL.observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && INFINITE_SCROLL.hasMore && !INFINITE_SCROLL.loading) {
        loadMoreItems();
      }
    });
  }, { rootMargin: '200px' });
}

function loadMoreItems() {
  if (INFINITE_SCROLL.loading || !INFINITE_SCROLL.hasMore) return;
  
  INFINITE_SCROLL.loading = true;
  INFINITE_SCROLL.currentPage++;
  
  const start = INFINITE_SCROLL.currentPage * INFINITE_SCROLL.itemsPerPage;
  const end = start + INFINITE_SCROLL.itemsPerPage;
  const newItems = filteredItems.slice(start, end);
  
  if (newItems.length === 0) {
    INFINITE_SCROLL.hasMore = false;
    INFINITE_SCROLL.loading = false;
    const indicator = document.getElementById('loadMoreIndicator');
    if (indicator) indicator.remove();
    return;
  }
  
  const grid = document.querySelector('.items-grid');
  if (!grid) {
    INFINITE_SCROLL.loading = false;
    return;
  }
  
  const indicator = document.getElementById('loadMoreIndicator');
  if (indicator) indicator.remove();
  
  const fragment = document.createDocumentFragment();
  newItems.forEach(item => {
    const card = createItemCard(item);
    fragment.appendChild(card);
  });
  
  grid.appendChild(fragment);
  
  if (end < filteredItems.length) {
    const loadMore = document.createElement('div');
    loadMore.className = 'load-more-indicator';
    loadMore.id = 'loadMoreIndicator';
    loadMore.innerHTML = '<div class="load-more-spinner"></div>';
    grid.appendChild(loadMore);
    INFINITE_SCROLL.observer.observe(loadMore);
  } else {
    INFINITE_SCROLL.hasMore = false;
  }
  
  INFINITE_SCROLL.loading = false;
}

// ============================================================================
// RENDER ITEMS
// ============================================================================
function createItemCard(item) {
  const id = item.stream_id || item.series_id;
  const isFav = favorites.some(f => f.id === id);
  const isLive = currentTab === 'live' || item.stream_type === 'live';
  const isSeries = currentTab === 'series' || item.stream_type === 'series';
  const isMovie = currentTab === 'movies' || item.stream_type === 'movie';
  
  const streamBadges = generateStreamBadges(item, item.container_extension);
  
  let defaultIcon = 'https://via.placeholder.com/300x450/1a1a25/606070?text=';
  if (isLive) defaultIcon += '📺';
  else if (isMovie) defaultIcon += '🎬';
  else if (isSeries) defaultIcon += '📺';
  else defaultIcon += 'No+Image';
  
  const card = document.createElement('div');
  card.className = 'item-card';
  card.innerHTML = `
    <button class="item-favorite ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav(${id}, '${(item.name || '').replace(/'/g, "\\\\'")}', '${item.stream_icon || item.cover || ''}', '${isSeries ? 'series' : (isMovie ? 'movies' : 'live')}')" aria-label="Favoritar">
      <i class="bi bi-heart${isFav ? '-fill' : ''}"></i>
    </button>
    ${item.rating ? `<div class="item-badge">⭐ ${parseFloat(item.rating).toFixed(1)}</div>` : ''}
    ${streamBadges}
    <img class="item-poster ${isLive ? 'item-poster-live' : ''}" 
         src="${item.stream_icon || item.cover || defaultIcon}" 
         alt="${item.name}"
         loading="lazy"
         onerror="this.src='${defaultIcon}'">
    <div class="item-play-overlay">
      <div class="play-btn">
        <i class="bi bi-play-fill"></i>
      </div>
    </div>
    <div class="item-info">
      <div class="item-title">${item.name}</div>
      ${item.year ? `<div class="item-meta"><i class="bi bi-calendar"></i> ${item.year}</div>` : ''}
    </div>
  `;
  
  card.onclick = () => handleItemClick(item);
  return card;
}

function renderItems(list) {
  const content = document.getElementById('content');
  document.getElementById('contentCount').textContent = `${list.length} itens`;

  // Reset infinite scroll
  INFINITE_SCROLL.currentPage = 0;
  INFINITE_SCROLL.hasMore = list.length > INFINITE_SCROLL.itemsPerPage;
  INFINITE_SCROLL.loading = false;

  if (list.length === 0) {
    content.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-inbox"></i>
        <h3>Nenhum item encontrado</h3>
        <p>Tente uma busca diferente ou selecione outra categoria.</p>
      </div>
    `;
    return;
  }

  setupInfiniteScroll();

  const initialItems = list.slice(0, INFINITE_SCROLL.itemsPerPage);
  
  const fragment = document.createDocumentFragment();
  const gridDiv = document.createElement('div');
  gridDiv.className = 'items-grid';
  
  initialItems.forEach(item => {
    const card = createItemCard(item);
    gridDiv.appendChild(card);
  });
  
  // Add load more indicator if there are more items
  if (list.length > INFINITE_SCROLL.itemsPerPage) {
    const loadMore = document.createElement('div');
    loadMore.className = 'load-more-indicator';
    loadMore.id = 'loadMoreIndicator';
    loadMore.innerHTML = '<div class="load-more-spinner"></div>';
    gridDiv.appendChild(loadMore);
    
    setTimeout(() => {
      const indicator = document.getElementById('loadMoreIndicator');
      if (indicator && INFINITE_SCROLL.observer) {
        INFINITE_SCROLL.observer.observe(indicator);
      }
    }, 100);
  }
  
  fragment.appendChild(gridDiv);
  content.innerHTML = '';
  content.appendChild(fragment);
}

// ============================================================================
// PLAYER
// ============================================================================
function initPlayer() {
  if (player) return;
  
  player = videojs('player', {
    controls: true,
    autoplay: false,
    preload: 'auto',
    fluid: true,
    html5: {
      vhs: {
        overrideNative: true,
        enableLowInitialPlaylist: true,
        smoothQualityChange: true,
        fastQualityChange: true
      }
    },
    liveui: true
  });
  
  player.on('error', function() {
    showToast('Erro ao reproduzir. Tentando novamente...', 'error');
  });
}

function playStream(url, type, name) {
  initPlayer();
  
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
  
  const isHLS = url.includes('.m3u8') || type === 'hls';
  const isTS = url.includes('.ts');
  
  updateStreamInfo(url, type);
  
  // Show player section
  const playerSection = document.getElementById('playerSection');
  playerSection.classList.add('show');
  
  if (isHLS) {
    if (Hls.isSupported()) {
      hlsInstance = new Hls({
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        maxBufferSize: 60 * 1000 * 1000,
        maxBufferHole: 0.5,
        lowLatencyMode: true,
        enableWorker: true,
        startLevel: -1
      });
      
      const videoElement = document.querySelector('#player video') || document.getElementById('player');
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(videoElement);
      
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        player.play().catch(e => {
          player.muted(true);
          player.play();
        });
      });
      
      hlsInstance.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          showToast('Erro no stream. Tentando reconectar...', 'error');
          hlsInstance.startLoad();
        }
      });
    } else {
      player.src({ src: url, type: 'application/x-mpegURL' });
      player.play().catch(e => {
        player.muted(true);
        player.play();
      });
    }
  } else {
    let mimeType = 'video/mp4';
    if (isTS) mimeType = 'video/mp2t';
    
    player.src({ src: url, type: mimeType });
    player.play().catch(e => {
      player.muted(true);
      player.play();
    });
  }
  
  document.getElementById('nowPlaying').textContent = name;
  document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth' });
}

function updateStreamInfo(url, type) {
  const streamInfo = document.getElementById('streamInfo');
  const badges = [];
  
  if (url.includes('.m3u8')) badges.push('<span class="stream-badge hls">HLS</span>');
  if (url.includes('.ts')) badges.push('<span class="stream-badge ts">TS</span>');
  if (url.includes('.mp4')) badges.push('<span class="stream-badge mp4">MP4</span>');
  
  streamInfo.innerHTML = badges.join('');
}

async function loadEPG(streamId) {
  const epgSection = document.getElementById('epgSection');
  
  try {
    // Check cache first
    const cacheKey = getCacheKey('epg', streamId);
    let epgData = getCache(cacheKey) || memoryCache.epg[streamId];
    
    if (!epgData) {
      const url = `${API.base}/player_api.php?username=${API.user}&password=${API.pass}&action=get_short_epg&stream_id=${streamId}&limit=2`;
      const res = await fetchWithTimeout(url, {}, 5000);
      const data = await res.json();
      
      if (data && data.epg_listings && data.epg_listings.length > 0) {
        epgData = data.epg_listings;
        setCache(cacheKey, epgData, CACHE_CONFIG.EPG_TTL);
        memoryCache.epg[streamId] = epgData;
      }
    }
    
    if (epgData && epgData.length > 0) {
      const current = epgData[0];
      const next = epgData[1];
      
      // Decode base64 title if needed
      let currentTitle = current.title;
      let nextTitle = next ? next.title : '--';
      
      try {
        if (current.title) currentTitle = atob(current.title);
        if (next && next.title) nextTitle = atob(next.title);
      } catch (e) {
        // Title is not base64 encoded
      }
      
      document.getElementById('epgCurrentTime').textContent = formatEPGTime(current.start, current.end);
      document.getElementById('epgCurrentTitle').textContent = currentTitle;
      
      if (next) {
        document.getElementById('epgNextTime').textContent = formatEPGTime(next.start, next.end);
        document.getElementById('epgNextTitle').textContent = nextTitle;
      } else {
        document.getElementById('epgNextTime').textContent = '--:-- - --:--';
        document.getElementById('epgNextTitle').textContent = '--';
      }
      
      epgSection.classList.add('show');
    } else {
      epgSection.classList.remove('show');
    }
  } catch (e) {
    console.log('EPG not available for this channel');
    epgSection.classList.remove('show');
  }
}

function formatEPGTime(start, end) {
  try {
    const startTime = new Date(start).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const endTime = new Date(end).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    return `${startTime} - ${endTime}`;
  } catch (e) {
    return '--:-- - --:--';
  }
}

function hideEPG() {
  document.getElementById('epgSection').classList.remove('show');
}

// ============================================================================
// LOGIN & AUTH
// ============================================================================
async function login() {
  const serverInput = document.getElementById("server").value.trim();
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!serverInput || !user || !pass) {
    showToast("Preencha todos os campos", "error");
    return;
  }

  const btnLogin = document.getElementById("btnLogin");
  btnLogin.disabled = true;
  btnLogin.innerHTML = '<i class="bi bi-hourglass-split"></i> Conectando...';

  let server = serverInput.replace(/^https?:\/\//, '').replace(/\/$/, '');
  
  const protocols = ['http', 'https'];
  let connected = false;
  let data = null;

  for (const protocol of protocols) {
    if (connected) break;
    
    const url = `${protocol}://${server}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
    
    try {
      const res = await fetchWithTimeout(url, {}, 15000);
      data = await res.json();
      
      if (data.user_info && data.user_info.auth == 1) {
        API = { base: `${protocol}://${server}`, user, pass };
        connected = true;
      }
    } catch (e) {
      console.log(`Failed with ${protocol}:`, e.message);
    }
  }

  if (!connected || !data) {
    showToast("Erro ao conectar. Verifique os dados.", "error");
    btnLogin.disabled = false;
    btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Entrar';
    return;
  }

  userInfo = data.user_info;
  
  localStorage.setItem('unitvCredentials', JSON.stringify({ server, user, pass }));
  saveSession(API, userInfo);

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  
  showToast("Login realizado com sucesso!", "success");
  
  loadTab();
}

function logout() {
  // Stop player
  if (player) {
    player.pause();
    player.src('');
  }
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
  
  // Clear cache and session
  clearAllCache();
  localStorage.removeItem('unitvCredentials');
  localStorage.removeItem('unitv_session');
  
  // Reload page
  location.reload();
}

function switchTab(tab, el) {
  if (currentTab === tab && items.length > 0 && !isGlobalSearch) return;
  
  document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  currentTab = tab;
  currentCategory = null;
  isGlobalSearch = false;
  
  // Clear search
  document.getElementById('search').value = '';
  
  // Hide episodes section when switching tabs (but keep player if playing)
  hidePlayerEpisodes();
  
  // Hide EPG if not live
  if (tab !== 'live') {
    hideEPG();
  }
  
  const titles = {
    live: 'TV ao Vivo',
    movies: 'Filmes',
    series: 'Séries',
    fav: 'Favoritos'
  };
  document.getElementById('contentTitle').textContent = titles[tab];
  
  const cachedCategories = getCachedData('categories', tab);
  const lastCategory = memoryCache.lastLoadedCategory[tab];
  const cachedItems = lastCategory ? getCachedData('items', tab, lastCategory) : getCachedData('items', tab, 'first');
  
  if (cachedCategories && cachedItems && cachedItems.length > 0) {
    categories = cachedCategories;
    items = cachedItems;
    filteredItems = items;
    currentCategory = lastCategory;
    renderCategories();
    renderItems(items);
    updateCacheIndicator(true);
    return;
  }
  
  loadTab();
}

// ============================================================================
// CONTENT LOADING
// ============================================================================
async function loadTab() {
  if (isLoading) return;
  
  const content = document.getElementById("content");
  const categoryList = document.getElementById("categoryList");
  
  const cachedCategories = getCachedData('categories', currentTab);
  
  if (!cachedCategories) {
    content.innerHTML = `
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <span>Carregando categorias...</span>
      </div>
    `;
    categoryList.innerHTML = '';
  }

  if (currentTab === "fav") {
    categories = [];
    items = favorites.map(f => ({
      stream_id: f.id,
      series_id: f.id,
      name: f.name,
      stream_icon: f.icon,
      cover: f.icon,
      type: f.type
    }));
    filteredItems = items;
    allItems = items;
    renderCategories();
    renderItems(items);
    return;
  }

  isLoading = true;
  
  try {
    let catAction = 'get_live_categories';
    let itemAction = 'get_live_streams';
    
    if (currentTab === 'movies') {
      catAction = 'get_vod_categories';
      itemAction = 'get_vod_streams';
    } else if (currentTab === 'series') {
      catAction = 'get_series_categories';
      itemAction = 'get_series';
    }

    let cats = getCachedData('categories', currentTab);
    
    if (!cats) {
      const catUrl = `${API.base}/player_api.php?username=${API.user}&password=${API.pass}&action=${catAction}`;
      const catRes = await fetchWithRetry(catUrl);
      cats = await catRes.json();
      
      if (!Array.isArray(cats)) cats = [];
      setCachedData('categories', currentTab, cats);
    }
    
    categories = cats;
    renderCategories();

    // Load ALL items for global search capability
    loadAllItemsForSearch(itemAction);

    if (categories.length > 0) {
      const firstCategoryId = categories[0].category_id;
      await loadCategoryItems(firstCategoryId, true);
    } else {
      let cachedItems = getCachedData('items', currentTab, 'all');
      
      if (!cachedItems) {
        const itemUrl = `${API.base}/player_api.php?username=${API.user}&password=${API.pass}&action=${itemAction}`;
        const itemRes = await fetchWithRetry(itemUrl);
        cachedItems = await itemRes.json();
        
        if (!Array.isArray(cachedItems)) cachedItems = [];
        setCachedData('items', currentTab, cachedItems, 'all');
      }
      
      items = cachedItems;
      filteredItems = items;
      allItems = items;
      renderItems(items);
    }
  } catch (e) {
    console.error('Error loading:', e);
    content.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-exclamation-triangle"></i>
        <h3>Erro ao carregar</h3>
        <p>Não foi possível carregar o conteúdo. Tente novamente.</p>
        <button class="btn-play" onclick="loadTab()" style="margin-top: 1rem;">
          <i class="bi bi-arrow-clockwise"></i> Tentar Novamente
        </button>
      </div>
    `;
  } finally {
    isLoading = false;
  }
}

// Load all items in background for global search
async function loadAllItemsForSearch(itemAction) {
  // Check if already cached
  let cachedAllItems = getCachedData('allItems', currentTab);
  if (cachedAllItems) {
    allItems = cachedAllItems;
    return;
  }
  
  try {
    const url = `${API.base}/player_api.php?username=${API.user}&password=${API.pass}&action=${itemAction}`;
    const res = await fetchWithRetry(url);
    const data = await res.json();
    
    allItems = Array.isArray(data) ? data : [];
    setCachedData('allItems', currentTab, allItems);
  } catch (e) {
    console.error('Error loading all items for search:', e);
    allItems = items;
  }
}

async function loadCategoryItems(categoryId, isFirstLoad = false) {
  if (isLoading && !isFirstLoad) return;
  
  const content = document.getElementById("content");
  
  // Reset global search state
  isGlobalSearch = false;
  
  const cachedItems = getCachedData('items', currentTab, categoryId);
  
  if (cachedItems && cachedItems.length > 0) {
    items = cachedItems;
    filteredItems = items;
    currentCategory = categoryId;
    memoryCache.lastLoadedCategory[currentTab] = categoryId;
    renderItems(items);
    updateCategoryActive(categoryId);
    return;
  }
  
  content.innerHTML = `
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <span>Carregando...</span>
    </div>
  `;

  let action = 'get_live_streams';
  if (currentTab === 'movies') action = 'get_vod_streams';
  if (currentTab === 'series') action = 'get_series';

  isLoading = true;
  
  try {
    const url = `${API.base}/player_api.php?username=${API.user}&password=${API.pass}&action=${action}&category_id=${categoryId}`;
    const res = await fetchWithRetry(url);
    const data = await res.json();
    
    items = Array.isArray(data) ? data : [];
    
    setCachedData('items', currentTab, items, categoryId);
    memoryCache.lastLoadedCategory[currentTab] = categoryId;
    
    currentCategory = categoryId;
    filteredItems = items;
    renderItems(items);
    updateCategoryActive(categoryId);
  } catch (e) {
    console.error('Error loading category:', e);
    showToast('Erro ao carregar categoria', 'error');
    content.innerHTML = `
      <div class="empty-state">
        <i class="bi bi-exclamation-triangle"></i>
        <h3>Erro ao carregar</h3>
        <p>Não foi possível carregar a categoria.</p>
        <button class="btn-play" onclick="loadCategoryItems(${categoryId})" style="margin-top: 1rem;">
          <i class="bi bi-arrow-clockwise"></i> Tentar Novamente
        </button>
      </div>
    `;
  } finally {
    isLoading = false;
  }
}

function updateCategoryActive(categoryId) {
  document.querySelectorAll('.category-item').forEach(c => {
    c.classList.remove('active');
    if (c.dataset.catId == categoryId) {
      c.classList.add('active');
    }
  });
}

function renderCategories() {
  const categoryList = document.getElementById("categoryList");
  categoryList.innerHTML = '';

  categories.forEach((cat, index) => {
    const item = document.createElement('div');
    item.className = `category-item ${index === 0 && !currentCategory ? 'active' : ''} ${currentCategory == cat.category_id ? 'active' : ''}`;
    item.dataset.catId = cat.category_id;
    item.innerHTML = `<span>${cat.category_name}</span>`;
    item.onclick = () => selectCategory(cat.category_id, item);
    categoryList.appendChild(item);
  });
}

function selectCategory(catId, el) {
  document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCategory = catId;
  
  // Clear search when selecting category
  document.getElementById('search').value = '';
  isGlobalSearch = false;
  
  loadCategoryItems(catId);
  
  if (window.innerWidth <= 1024) {
    document.getElementById('sidebar').classList.remove('show');
  }
}

async function handleItemClick(item) {
  if (currentTab === 'live' || item.stream_type === 'live') {
    playLiveChannel(item);
  } else if (currentTab === 'movies' || item.stream_type === 'movie') {
    await showMovieDetails(item);
  } else if (currentTab === 'series' || item.stream_type === 'series') {
    await showSeriesDetails(item);
  } else if (currentTab === 'fav') {
    if (item.type === 'series') {
      await showSeriesDetails(item);
    } else if (item.type === 'movies') {
      await showMovieDetails(item);
    } else {
      playLiveChannel(item);
    }
  }
}

  hidePlayerEpisodes();
  currentPlayingChannel = item;
  
  const url = `${API.base}/live/${API.user}/${API.pass}/${item.stream_id}.m3u8`;
  playStream(url, 'hls', item.name);
  
  // Load EPG for this channel
  loadEPG(item.stream_id);
}

      <div class="episode-info">
        <div class="episode-title">${ep.title || `Episódio ${ep.episode_num}`}</div>
        ${ep.info?.duration ? `<div class="episode-duration"><i class="bi bi-clock"></i> ${ep.info.duration}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function playFirstEpisode() {
  if (!currentSeriesInfo || !currentSeriesInfo.episodes) return;
  
  const seasonKeys = Object.keys(currentSeriesInfo.episodes).sort((a, b) => parseInt(a) - parseInt(b));
  if (seasonKeys.length === 0) return;
  
  const firstSeason = seasonKeys[0];
  const episodes = currentSeriesInfo.episodes[firstSeason];
  if (!episodes || episodes.length === 0) return;
  
  const firstEp = episodes[0];
  playEpisode(firstEp.id, firstEp.container_extension || 'mp4', firstEp.title || `Episódio ${firstEp.episode_num}`);
}

function playEpisode(episodeId, ext = 'mp4', title = 'Episódio') {
  closeModal('detailModal');
  hideEPG();
  
  currentPlayingEpisodeId = episodeId;
  
  const url = `${API.base}/series/${API.user}/${API.pass}/${episodeId}.${ext}`;
  const type = ext === 'mp4' || ext === 'mkv' ? 'mp4' : 'hls';
  playStream(url, type, title);
  
  // Show episodes below player for binge watching
  showPlayerEpisodes();
}

// ============================================================================
// PLAYER EPISODES SECTION (HORIZONTAL SCROLL)
// ============================================================================
function showPlayerEpisodes() {
  if (!currentSeriesInfo || !currentSeriesInfo.episodes) {
    hidePlayerEpisodes();
    return;
  }
  
  const section = document.getElementById('playerEpisodesSection');
  const titleEl = document.getElementById('seriesTitlePlayer');
  const tabsContainer = document.getElementById('seasonsTabsPlayer');
  const scrollContainer = document.getElementById('episodesScrollPlayer');
  
  // Set series title
  const seriesName = currentSeriesInfo.info?.name || currentSeriesInfo.info?.title || 'Série';
  titleEl.textContent = seriesName;
  
  // Get seasons
  const seasonKeys = Object.keys(currentSeriesInfo.episodes).sort((a, b) => parseInt(a) - parseInt(b));
  
  if (seasonKeys.length === 0) {
    hidePlayerEpisodes();
    return;
  }
  
  // Render season tabs
  tabsContainer.innerHTML = seasonKeys.map(s => `
    <button class="season-tab ${s === currentPlayingSeason ? 'active' : ''}" 
            onclick="selectPlayerSeason('${s}')">
      T${s}
    </button>
  `).join('');
  
  // Render episodes
  renderPlayerEpisodes(currentPlayingSeason);
  
  section.classList.add('show');
}

function selectPlayerSeason(season) {
  currentPlayingSeason = season;
  
  // Update active tab
  document.querySelectorAll('#seasonsTabsPlayer .season-tab').forEach(tab => {
    tab.classList.remove('active');
    if (tab.textContent === `T${season}`) {
      tab.classList.add('active');
    }
  });
  
  // Also update modal season select if open
  const modalSelect = document.getElementById('seasonSelect');
  if (modalSelect) {
    modalSelect.value = season;
  }
  
  renderPlayerEpisodes(season);
}

function renderPlayerEpisodes(season) {
  const scrollContainer = document.getElementById('episodesScrollPlayer');
  
  if (!currentSeriesInfo || !currentSeriesInfo.episodes || !currentSeriesInfo.episodes[season]) {
    scrollContainer.innerHTML = '<p style="color: var(--text-muted); padding: 1rem;">Nenhum episódio disponível.</p>';
    return;
  }
  
  const episodes = currentSeriesInfo.episodes[season];
  
  scrollContainer.innerHTML = episodes.map(ep => {
    const isPlaying = ep.id === currentPlayingEpisodeId;
    return `
      <div class="episode-card-horizontal ${isPlaying ? 'playing' : ''}" 
           onclick="playEpisodeFromPlayer(${ep.id}, '${ep.container_extension || 'mp4'}', '${(ep.title || 'Episódio ' + ep.episode_num).replace(/'/g, "\\\\'")}')">
        <div class="episode-number-badge">${ep.episode_num || ep.id}</div>
        <div class="ep-title">${ep.title || `Episódio ${ep.episode_num}`}</div>
        ${ep.info?.duration ? `<div class="ep-duration"><i class="bi bi-clock"></i> ${ep.info.duration}</div>` : ''}
      </div>
    `;
  }).join('');
  
  // Scroll to playing episode
  setTimeout(() => {
    const playingCard = scrollContainer.querySelector('.playing');
    if (playingCard) {
      playingCard.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }, 100);
}

function playEpisodeFromPlayer(episodeId, ext = 'mp4', title = 'Episódio') {
  currentPlayingEpisodeId = episodeId;
  
  const url = `${API.base}/series/${API.user}/${API.pass}/${episodeId}.${ext}`;
  const type = ext === 'mp4' || ext === 'mkv' ? 'mp4' : 'hls';
  playStream(url, type, title);
  
  // Update UI to show which episode is playing
  renderPlayerEpisodes(currentPlayingSeason);
}

function hidePlayerEpisodes() {
  const section = document.getElementById('playerEpisodesSection');
  section.classList.remove('show');
  currentPlayingSeriesId = null;
  currentPlayingSeason = null;
  currentPlayingEpisodeId = null;
}

// ============================================================================
// FAVORITES
// ============================================================================
function toggleFav(id, name, icon, type) {
  const exists = favorites.find(f => f.id === id);
  
  if (exists) {
    favorites = favorites.filter(f => f.id !== id);
    showToast('Removido dos favoritos', 'info');
  } else {
    favorites.push({ id, name, icon, type });
    showToast('Adicionado aos favoritos', 'success');
  }
  
  localStorage.setItem("unitvFav", JSON.stringify(favorites));
  
  if (currentTab === 'fav') {
    items = favorites.map(f => ({
      stream_id: f.id,
      series_id: f.id,
      name: f.name,
      stream_icon: f.icon,
      cover: f.icon,
      type: f.type
    }));
    filteredItems = items;
    renderItems(items);
  } else {
    renderItems(filteredItems);
  }
}

function toggleFavFromModal(id, name, icon, type) {
  toggleFav(id, name, icon, type);
}

// ============================================================================
// GLOBAL SEARCH
// ============================================================================
document.getElementById("search").addEventListener("input", e => {
  const query = e.target.value.toLowerCase().trim();
  
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    if (query === '') {
      // Return to category view
      isGlobalSearch = false;
      if (currentCategory) {
        loadCategoryItems(currentCategory);
      } else {
        filteredItems = items;
        renderItems(filteredItems);
      }
      return;
    }
    
    // GLOBAL SEARCH - search in ALL items, not just current category
    isGlobalSearch = true;
    
    // Use allItems for global search
    const searchSource = allItems.length > 0 ? allItems : items;
    filteredItems = searchSource.filter(i => i.name && i.name.toLowerCase().includes(query));
    
    // Update title to show we're in search mode
    document.getElementById('contentTitle').textContent = `Resultados para "${query}"`;
    
    // Deselect category
    document.querySelectorAll('.category-item').forEach(c => c.classList.remove('active'));
    
    renderItems(filteredItems);
  }, SEARCH_DEBOUNCE_MS);
});

// ============================================================================
// KEYBOARD SHORTCUTS & EVENT LISTENERS
// ============================================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('detailModal');
    closeModal('accountModal');
  }
});

document.querySelectorAll('.modal-overlay').forEach(modal => {
  modal.addEventListener('click', e => {
    if (e.target === modal) {
      modal.classList.remove('show');
    }
  });
});

// Header scroll effect
window.addEventListener('scroll', () => {
  const header = document.getElementById('appHeader');
  if (header) {
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  }
});

// Resize handler
window.addEventListener('resize', () => {
  // Recalculate items per page based on screen size
  const width = window.innerWidth;
  if (width < 480) {
    INFINITE_SCROLL.itemsPerPage = 20;
  } else if (width < 768) {
    INFINITE_SCROLL.itemsPerPage = 30;
  } else if (width < 1200) {
    INFINITE_SCROLL.itemsPerPage = 40;
  } else {
    INFINITE_SCROLL.itemsPerPage = 60;
  }
});

// ============================================================================
// INITIALIZATION
// ============================================================================
window.onload = function() {
  // Setup infinite scroll observer
  setupInfiniteScroll();
  
  if (restoreSession()) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadTab();
  } else {
    const creds = localStorage.getItem('unitvCredentials');
    if (creds) {
      const { server, user, pass } = JSON.parse(creds);
      document.getElementById('server').value = server;
      document.getElementById('username').value = user;
      document.getElementById('password').value = pass;
    }
  }
};
</script>
